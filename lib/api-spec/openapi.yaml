openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SpaceX IPO Access API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: investors
    description: Investor signup operations
  - name: auth
    description: Authentication
  - name: stock
    description: Stock market data
  - name: deposits
    description: Deposit operations
  - name: holdings
    description: User holdings
  - name: admin
    description: Admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /investors:
    post:
      operationId: createInvestor
      tags: [investors]
      summary: Sign up for investor access
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvestorInput"
      responses:
        "201":
          description: Investor registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Investor"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /investors/count:
    get:
      operationId: getInvestorCount
      tags: [investors]
      summary: Get number of registered investors
      responses:
        "200":
          description: Investor count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvestorCount"

  /signin:
    post:
      operationId: signIn
      tags: [auth]
      summary: Sign in with email — returns investor status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignInInput"
      responses:
        "200":
          description: Sign in result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignInResult"
        "404":
          description: Email not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stock/quote:
    get:
      operationId: getStockQuote
      tags: [stock]
      summary: Get current SPCX stock quote
      responses:
        "200":
          description: Current stock quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockQuote"

  /stock/history:
    get:
      operationId: getStockHistory
      tags: [stock]
      summary: Get SPCX price history
      parameters:
        - name: period
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GetStockHistoryPeriod"
      responses:
        "200":
          description: Price history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockHistory"

  /holdings:
    get:
      operationId: getHoldings
      tags: [holdings]
      summary: Get holdings for the current user (by email query param)
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Holdings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Holdings"
        "404":
          description: Investor not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /deposits:
    post:
      operationId: createDeposit
      tags: [deposits]
      summary: Submit a deposit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDepositInput"
      responses:
        "201":
          description: Deposit created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepositRecord"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Investor not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /deposit-addresses:
    get:
      operationId: getDepositAddresses
      tags: [deposits]
      summary: Get public crypto deposit addresses
      responses:
        "200":
          description: List of deposit addresses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DepositAddress"

  /admin/investors:
    get:
      operationId: adminListInvestors
      tags: [admin]
      summary: List all investors with holdings (admin)
      responses:
        "200":
          description: List of investors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InvestorAdmin"

  /admin/investors/{id}/status:
    patch:
      operationId: adminUpdateInvestorStatus
      tags: [admin]
      summary: Approve or reject an investor (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvestorStatusInput"
      responses:
        "200":
          description: Updated investor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvestorAdmin"
        "404":
          description: Investor not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/investors/{id}/credit:
    post:
      operationId: creditInvestor
      tags: [admin]
      summary: Manually credit shares to an investor (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreditInput"
      responses:
        "200":
          description: Updated holdings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Holdings"
        "404":
          description: Investor not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/deposits:
    get:
      operationId: adminListDeposits
      tags: [admin]
      summary: List all deposits (admin)
      responses:
        "200":
          description: List of deposits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DepositAdmin"

  /admin/deposits/{id}/status:
    patch:
      operationId: adminUpdateDepositStatus
      tags: [admin]
      summary: Verify or reject a deposit (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepositStatusInput"
      responses:
        "200":
          description: Updated deposit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepositRecord"
        "404":
          description: Deposit not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/deposit-addresses/{coin}:
    put:
      operationId: updateDepositAddress
      tags: [admin]
      summary: Update a crypto deposit address (admin)
      parameters:
        - name: coin
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDepositAddressInput"
      responses:
        "200":
          description: Updated address
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepositAddress"
        "400":
          description: Invalid coin or address
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          enum: [ok]
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    InvestorInput:
      type: object
      properties:
        fullName:
          type: string
          minLength: 1
        email:
          type: string

      required: [fullName, email]

    Investor:
      type: object
      properties:
        id:
          type: integer
        fullName:
          type: string
        email:
          type: string
        status:
          $ref: "#/components/schemas/InvestorStatus"
        createdAt:
          type: string
          format: date-time
      required: [id, fullName, email, status, createdAt]

    InvestorStatus:
      type: string
      enum: [pending, approved, rejected]

    InvestorCount:
      type: object
      properties:
        count:
          type: integer
      required: [count]

    InvestorAdmin:
      type: object
      properties:
        id:
          type: integer
        fullName:
          type: string
        email:
          type: string
        status:
          $ref: "#/components/schemas/InvestorAdminStatus"
        createdAt:
          type: string
          format: date-time
        shares:
          type: string
        avgCost:
          type: string
      required: [id, fullName, email, status, createdAt, shares, avgCost]

    InvestorAdminStatus:
      type: string
      enum: [pending, approved, rejected]

    InvestorStatusInput:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/InvestorStatusInputStatus"
      required: [status]

    InvestorStatusInputStatus:
      type: string
      enum: [pending, approved, rejected]

    CreditInput:
      type: object
      properties:
        shares:
          type: number
          minimum: 0
        pricePerShare:
          type: number
          minimum: 0
      required: [shares, pricePerShare]

    SignInInput:
      type: object
      properties:
        email:
          type: string

      required: [email]

    SignInResult:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/SignInResultStatus"
        fullName:
          type: string
        email:
          type: string
      required: [status, fullName, email]

    SignInResultStatus:
      type: string
      enum: [pending, approved, rejected]

    GetStockHistoryPeriod:
      type: string
      enum: [1D, 1W, 1M, 3M, 1Y, 5Y]

    StockQuote:
      type: object
      properties:
        symbol:
          type: string
        price:
          type: number
        change:
          type: number
        changePct:
          type: number
        volume:
          type: number
        marketCap:
          type: number
        bid:
          type: number
        ask:
          type: number
        dayLow:
          type: number
        dayHigh:
          type: number
        week52High:
          type: number
        week52Low:
          type: number
        peRatio:
          type: number
        avgVolume:
          type: number
        sharesOut:
          type: string
      required: [symbol, price, change, changePct, volume, marketCap, bid, ask, dayLow, dayHigh, week52High, week52Low, peRatio, avgVolume, sharesOut]

    StockDataPoint:
      type: object
      properties:
        time:
          type: string
        price:
          type: number
      required: [time, price]

    StockHistory:
      type: object
      properties:
        period:
          type: string
        data:
          type: array
          items:
            $ref: "#/components/schemas/StockDataPoint"
      required: [period, data]

    Holdings:
      type: object
      properties:
        investorId:
          type: integer
        shares:
          type: string
        avgCost:
          type: string
        updatedAt:
          type: string
          format: date-time
      required: [investorId, shares, avgCost, updatedAt]

    CreateDepositInput:
      type: object
      properties:
        email:
          type: string

        amount:
          type: number
          minimum: 1
        method:
          $ref: "#/components/schemas/DepositRecordMethod"
        coin:
          type: string
          enum: [BTC, ETH, DOGE]
      required: [email, amount, method]

    DepositRecordMethod:
      type: string
      enum: [card, crypto]

    DepositRecordStatus:
      type: string
      enum: [pending, completed, failed]

    DepositRecord:
      type: object
      properties:
        id:
          type: integer
        investorId:
          type: integer
        email:
          type: string
        amount:
          type: string
        method:
          $ref: "#/components/schemas/DepositRecordMethod"
        coin:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/DepositRecordStatus"
        createdAt:
          type: string
          format: date-time
      required: [id, investorId, email, amount, method, status, createdAt]

    DepositAdmin:
      type: object
      properties:
        id:
          type: integer
        investorId:
          type: integer
        fullName:
          type: string
        email:
          type: string
        amount:
          type: string
        method:
          $ref: "#/components/schemas/DepositRecordMethod"
        coin:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/DepositRecordStatus"
        createdAt:
          type: string
          format: date-time
      required: [id, investorId, fullName, email, amount, method, status, createdAt]

    DepositStatusInput:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/DepositRecordStatus"
      required: [status]

    DepositAddress:
      type: object
      properties:
        coin:
          type: string
        address:
          type: string
        updatedAt:
          type: string
          format: date-time
      required: [coin, address, updatedAt]

    UpdateDepositAddressInput:
      type: object
      properties:
        address:
          type: string
          minLength: 10
      required: [address]
